<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bangalore House Price Prediction</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

    <div class="container">

        <h1>Bangalore House Price Prediction</h1>
        <p class="subtitle">
            Estimate the price of a house using Machine Learning
        </p>

        <div class="card">

            <div class="input-group">
                <label>Total Square Feet</label>
                <input
                    type="number"
                    id="sqft"
                    placeholder="e.g. 1200"
                    min="300"
                    required>
            </div>

            <div class="row">

                <div class="input-group">
                    <label>BHK</label>
                    <input
                        type="number"
                        id="bhk"
                        placeholder="2"
                        min="1"
                        required>
                </div>

                <div class="input-group">
                    <label>Bathrooms</label>
                    <input
                        type="number"
                        id="bath"
                        placeholder="2"
                        min="1"
                        required>
                </div>

            </div>

            <div class="input-group">
                <label>Location</label>

                <select id="location">

                    <option disabled selected>
                        Loading locations...
                    </option>

                </select>
            </div>

            <button id="predictBtn">
                Predict Price
            </button>

            <div class="result">

                <h2>Estimated Price</h2>

                <div id="price">
                    ₹ --
                </div>

            </div>

        </div>

    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <script src="{{ url_for('static', filename='script.js') }}"></script>

</body>

</html>
